<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <title>QR Code — Manutenção Clínica FSPNH</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700&family=Barlow+Condensed:wght@700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Barlow', sans-serif;
      background: #f1f5f9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
      gap: 32px;
    }

    h1 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 22px;
      color: #0a2342;
      text-align: center;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .cards-wrapper {
      display: flex;
      flex-wrap: wrap;
      gap: 24px;
      justify-content: center;
    }

    .qr-card {
      background: white;
      border-radius: 16px;
      padding: 28px 24px 20px;
      box-shadow: 0 4px 24px rgba(10,35,66,0.12);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      border-top: 5px solid #1a4a8a;
      width: 280px;
    }

    .qr-card .logo-header {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .qr-card .logo-header img {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      object-fit: contain;
      border: 2px solid #00b4d8;
      background: white;
      padding: 3px;
    }

    .qr-card .logo-header div h2 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 15px;
      color: #0a2342;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .qr-card .logo-header div p {
      font-size: 10px;
      color: #00b4d8;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* QR wrapper with logo in center */
    .qr-wrapper {
      position: relative;
      width: 200px;
      height: 200px;
    }

    #qrcode canvas, #qrcode img {
      border-radius: 8px;
    }

    .qr-logo {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: white;
      border: 3px solid white;
      object-fit: contain;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    .qr-card .setor-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 18px;
      font-weight: 700;
      color: #1a4a8a;
      text-transform: uppercase;
      letter-spacing: 1px;
      text-align: center;
    }

    .qr-card .url-label {
      font-size: 10px;
      color: #94a3b8;
      text-align: center;
      word-break: break-all;
    }

    .qr-card .instrucao {
      font-size: 12px;
      color: #475569;
      text-align: center;
      line-height: 1.5;
      background: #f8fafc;
      border-radius: 8px;
      padding: 8px 12px;
      border-left: 3px solid #00b4d8;
    }

    .btn-print {
      background: linear-gradient(135deg, #1a4a8a, #2d72d2);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 12px 32px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(26,74,138,0.3);
    }
    .btn-print:hover { opacity: 0.9; }

    @media print {
      body { background: white; padding: 0; }
      .btn-print { display: none; }
      h1 { display: none; }
      .cards-wrapper { gap: 0; }
      .qr-card { box-shadow: none; break-inside: avoid; border: 1px solid #e2e8f0; }
    }
  </style>
</head>
<body>

<h1>🏥 QR Codes — Manutenção Clínica FSPNH</h1>

<div class="cards-wrapper">
  <!-- Card único (pode duplicar para cada setor) -->
  <div class="qr-card">
    <div class="logo-header">
      <img src="../src/assets/logo.jpg" alt="FSPNH" id="logo-img"/>
      <div>
        <h2>Manutenção Clínica</h2>
        <p>FSNH</p>
      </div>
    </div>

    <div class="qr-wrapper">
      <div id="qrcode"></div>
      <img class="qr-logo" src="../src/assets/logo.jpg" alt="Logo" id="qr-logo-center"/>
    </div>

    <div class="setor-label">📱 Abrir Chamado</div>
    <div class="url-label">manutencaoclinica.vercel.app</div>
    <div class="instrucao">
      Aponte a câmera do celular para o QR Code e abra o link para registrar um chamado de manutenção.
    </div>
  </div>
</div>

<button class="btn-print" onclick="window.print()">🖨️ Imprimir QR Code</button>

<script>
  const URL_SISTEMA = 'https://manutencaoclinica.vercel.app';

  // Gera QR Code e depois sobrepõe logo no canvas
  const qrDiv = document.getElementById('qrcode');
  const qr = new QRCode(qrDiv, {
    text:         URL_SISTEMA,
    width:        200,
    height:       200,
    colorDark:    '#0a2342',
    colorLight:   '#ffffff',
    correctLevel: QRCode.CorrectLevel.H
  });

  // Após o QR Code ser gerado, desenha o logo no centro do canvas
  setTimeout(() => {
    const canvas = qrDiv.querySelector('canvas');
    if (!canvas) return;

    const ctx    = canvas.getContext('2d');
    const logoEl = document.getElementById('logo-img');
    const size   = canvas.width;
    const lSize  = size * 0.22; // logo ocupa 22% do QR
    const lX     = (size - lSize) / 2;
    const lY     = (size - lSize) / 2;

    // Fundo branco circular atrás do logo
    ctx.beginPath();
    ctx.arc(size / 2, size / 2, lSize / 2 + 6, 0, Math.PI * 2);
    ctx.fillStyle = '#ffffff';
    ctx.fill();

    // Desenha o logo centralizado
    const img = new Image();
    img.onload = () => {
      ctx.save();
      ctx.beginPath();
      ctx.arc(size / 2, size / 2, lSize / 2, 0, Math.PI * 2);
      ctx.clip();
      ctx.drawImage(img, lX, lY, lSize, lSize);
      ctx.restore();

      // Esconde img overlay (já desenhamos no canvas)
      document.getElementById('qr-logo-center').style.display = 'none';
    };
    img.src = logoEl.src;
  }, 300);
</script>
</body>
</html>
