  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Barlow',sans-serif;background:#f1f5f9;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 16px;gap:28px}
    h1{font-family:'Barlow Condensed',sans-serif;font-size:20px;color:#0a2342;text-align:center;letter-spacing:1px;text-transform:uppercase}
    .qr-card{background:white;border-radius:16px;padding:28px 24px 20px;box-shadow:0 4px 24px rgba(10,35,66,0.12);display:flex;flex-direction:column;align-items:center;gap:14px;border-top:5px solid #1a4a8a;width:280px}
    .logo-header{display:flex;align-items:center;gap:10px}
    .logo-header img{width:44px;height:44px;border-radius:50%;object-fit:contain;border:2px solid #00b4d8;background:white;padding:3px}
    .logo-header h2{font-family:'Barlow Condensed',sans-serif;font-size:15px;color:#0a2342;text-transform:uppercase;letter-spacing:0.5px}
    .logo-header p{font-size:10px;color:#00b4d8;font-weight:600;letter-spacing:1px;text-transform:uppercase}
    #qrcode{width:200px;height:200px}
    #qrcode canvas{border-radius:8px;display:block}
    .setor-label{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;color:#1a4a8a;text-transform:uppercase;letter-spacing:1px;text-align:center}
    .url-label{font-size:10px;color:#94a3b8;text-align:center}
    .instrucao{font-size:12px;color:#475569;text-align:center;line-height:1.5;background:#f8fafc;border-radius:8px;padding:8px 12px;border-left:3px solid #00b4d8}
    .btn-print{background:linear-gradient(135deg,#1a4a8a,#2d72d2);color:white;border:none;border-radius:10px;padding:12px 32px;font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer}
    @media print{.btn-print{display:none}h1{display:none}.qr-card{box-shadow:none;border:1px solid #e2e8f0}}
  </style>
</head>
