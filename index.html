      projectId:"manutencao-clinica-fsnh",

      try {
        const r = await addDoc(collection(db,"chamados"),{...dados,status:"aberto",criadoEm:serverTimestamp()});

      } catch(e) { console.error("Firebase:",e); return null; }
    };

<body>
<header>
  <img src="src/assets/logo-fsnh.png" class="hlogo" alt="FSNH"/>
  <div class="htxt">
    <h1>Manutenção Clínica</h1>
    <p><span class="txt-d">Fundação de Saúde Pública de Novo Hamburgo</span><span class="txt-m">FSNH</span></p>
  </div>
  <div class="badge" id="hnum">Nova OS</div>
</header>
<main>
  <!-- STEP 1: FORMULÁRIO -->
  <div class="step active" id="s1">
    <div class="card">
      <div class="num-box"><small>Nº do Chamado</small><span id="num">—</span></div>
      <div class="ctitle"><span>🏥</span> Identificação</div>
      <div class="row">
        <div class="fg"><label>Solicitante <span class="rs">*</span></label><input id="solicitante" placeholder="Seu Nome"/></div>
        <div class="fg"><label>Setor <span class="rs">*</span></label><input id="setor" placeholder="Ex: UTI, PS..."/></div>
      </div>
      <div class="row">
        <div class="fg"><label>Leito / Quarto</label><input id="leito" placeholder="Ex: 12A..."/></div>
        <div class="fg"><label>Data / Hora</label><input id="dt" readonly/></div>
      </div>
      <div class="divider"></div>
      <div class="ctitle"><span>🔧</span> Equipamento</div>
      <div class="row">
        <div class="fg"><label>Equipamento <span class="rs">*</span></label>
          <select id="equip">
            <option value="">Selecione...</option>
            <option>Monitor</option><option>Cama</option><option>Oxímetro de Transporte</option>
            <option>ECG</option><option>Eletro</option><option>Lâmina de Laringoscópio</option>
            <option>Respirador</option><option>MAP</option><option>Berço</option>
            <option>Parede de Gases</option><option>Outros</option>
          </select>
        </div>
        <div class="fg"><label>Marca / Modelo</label><input id="marca" placeholder="Ex: Philips MX800..."/></div>
      </div>
      <div class="row full">
        <div class="fg"><label>Falha Identificada <span class="rs">*</span></label>
          <select id="falha"><option value="">Selecione...</option><option>Falha</option><option>Não Liga</option><option>Quebrado</option></select>
        </div>
      </div>
      <div class="row full">
        <div class="fg"><label>Descrição do Problema <span class="rs">*</span></label>
          <textarea id="desc" placeholder="Descreva detalhadamente o problema..."></textarea>
        </div>
      </div>
      <button class="btn btn-p" onclick="enviar()">📨 Enviar para Manutenção Clínica</button>
    </div>
  </div>
  <!-- STEP 2: CONFIRMAÇÃO -->
  <div class="step" id="s2">
    <div class="card">
      <div id="done">
        <div class="icon">✅</div>
        <h2>Chamado Enviado!</h2>
        <p>A OS <span class="num" id="done-num"></span> foi enviada para a Manutenção Clínica.<br/>
        O técnico receberá o e-mail com o link para finalização.</p>
        <br/>
        <button class="btn btn-p" onclick="location.reload()" style="max-width:260px;margin:0 auto">+ Nova OS</button>
      </div>
    </div>
  </div>
</main>
<div id="toast"></div>
<script>
  const SVC='service_utaq4mc', TPL='template_7kxq2w1', KEY='LRdHG7gjMde2p8TZv';
  emailjs.init(KEY);
  let osNum='';

  function getNum(){
    const now=new Date();
    const ym=now.getFullYear().toString().slice(-2)+String(now.getMonth()+1).padStart(2,'0');
    const k='mc_cnt';
    const d=JSON.parse(localStorage.getItem(k)||'{"ym":"","seq":0}');
    const seq=d.ym===ym?d.seq+1:1;
    localStorage.setItem(k,JSON.stringify({ym,seq}));
    return 'MC-'+ym+'-'+String(seq).padStart(4,'0');
  }

  window.addEventListener('DOMContentLoaded',()=>{
    const now=new Date();
    document.getElementById('dt').value=now.toLocaleDateString('pt-BR')+' '+now.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
    osNum=getNum();
    document.getElementById('num').textContent=osNum;
    document.getElementById('hnum').textContent=window.innerWidth<=600?'MC-'+osNum.split('-')[2]:osNum;
    document.getElementById('done-num').textContent=osNum;
  });

  function v(fields){
    for(const [id,lbl] of fields){
      const el=document.getElementById(id);
      if(!el||!el.value.trim()){toast('Preencha: '+lbl,'err');el?.focus();return false;}
    }
    return true;
  }

  async function enviar(){
    if(!v([['solicitante','Solicitante'],['setor','Setor'],['equip','Equipamento'],['falha','Falha'],['desc','Descrição']]))return;
    const btn=document.querySelector('#s1 .btn');
    btn.disabled=true;btn.textContent='⏳ Enviando...';
    const dados={
      numero:osNum,
      dataHora:document.getElementById('dt').value,
      solicitante:document.getElementById('solicitante').value.trim(),
      setor:document.getElementById('setor').value.trim(),
      leito:document.getElementById('leito').value.trim()||'—',
      equipamento:document.getElementById('equip').value,
      marca:document.getElementById('marca').value.trim()||'—',
      falha:document.getElementById('falha').value,
      descricao:document.getElementById('desc').value.trim(),
      link_os:'https://manutencaoclinica.vercel.app/os/?os='+osNum,
    };
    try{
      await emailjs.send(SVC,TPL,dados);
      await window.salvarFirebase(dados);
      toast('✅ OS enviada para Manutenção!','ok');
      document.getElementById('s1').classList.remove('active');
      document.getElementById('s2').classList.add('active');
      window.scrollTo({top:0,behavior:'smooth'});
    }catch(e){
      const m=e?.text||e?.message||JSON.stringify(e);
      toast('Erro: '+m,'err');
      alert('Erro:\n'+m);
      btn.disabled=false;btn.textContent='📨 Enviar para Manutenção Clínica';
    }
  }

  function toast(msg,t=''){
    const el=document.getElementById('toast');
    el.textContent=msg;el.className='show '+t;
    setTimeout(()=>el.className='',3200);
  }
</script>
</body>
</html>
