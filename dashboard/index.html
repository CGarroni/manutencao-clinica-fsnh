<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Dashboard — Manutenção Clínica FSNH</title>
  <link rel="icon" type="image/jpeg" href="../src/assets/favicon.ico"/>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@500;600;700&display=swap" rel="stylesheet"/>
  <script type="module">
    import {initializeApp}                                    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import {getFirestore,collection,query,orderBy,getDocs}   from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import {getAuth,onAuthStateChanged,signOut}              from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const app  = initializeApp({
      apiKey:"AIzaSyA3FrGpdN7Ja4fyiYjxgjbeqvFCrd-RYOw",
      authDomain:"manutencao-clinica-fsnh.firebaseapp.com",
      projectId:"manutencao-clinica-fsnh",
      storageBucket:"manutencao-clinica-fsnh.firebasestorage.app",
      messagingSenderId:"669634366108",
      appId:"1:669634366108:web:80440c3f2116aeb7b8bb59"
    });
    const db   = getFirestore(app);
    const auth = getAuth(app);

    // ── PROTEÇÃO DA PÁGINA ──────────────────────────────────────
    onAuthStateChanged(auth, user => {
      if (!user) {
        location.href = '/auth/login.html?next=/dashboard/';
      } else {
        document.getElementById('user-email').textContent = user.email;
        window.carregarDados();
      }
    });

    // ── LOGOUT ─────────────────────────────────────────────────
    window.fazerLogout = async () => {
      await signOut(auth);
      location.href = '/auth/login.html';
    };

    window.carregarDados = async function(){
      try{
        const snap = await getDocs(query(collection(db,"chamados"),orderBy("criadoEm","desc")));
        const todos = snap.docs.map(d=>({_id:d.id,...d.data()}));
        window.renderDashboard(todos);
      }catch(e){
        console.error(e);
        document.getElementById('loading').innerHTML='<p style="color:#ef4444;text-align:center;padding:20px">Erro ao carregar dados. Verifique a conexão.</p>';
      }
    };
  </script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --blue-dark:#0a2342;--blue-mid:#1a4a8a;--blue-light:#2d72d2;--teal:#00b4d8;
      --gray-50:#f8fafc;--gray-100:#f1f5f9;--gray-200:#e2e8f0;--gray-400:#94a3b8;
      --gray-600:#475569;--gray-800:#1e293b;--red:#ef4444;--green:#22c55e;--orange:#f97316;
    }
    body{font-family:'Barlow',sans-serif;background:var(--gray-100);color:var(--gray-800);min-height:100vh}

    

    /* ── HEADER ── */
    header{background:linear-gradient(135deg,var(--blue-dark),var(--blue-mid));padding:14px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:3px solid var(--teal)}
    .h-left{display:flex;align-items:center;gap:12px}
    .h-logo{width:46px;height:46px;border-radius:50%;object-fit:contain;background:white;padding:3px;border:2px solid var(--teal)}
    .h-title h1{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;color:white;letter-spacing:1px;text-transform:uppercase;line-height:1.1}
    .h-title p{font-size:10px;color:var(--teal);letter-spacing:2px;text-transform:uppercase;margin-top:2px}
    .h-right{display:flex;align-items:center;gap:12px}
    .att-info{font-size:11px;color:var(--gray-400);text-align:right}
    .btn-sair{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:white;padding:6px 14px;border-radius:8px;font-family:'Barlow',sans-serif;font-size:12px;cursor:pointer;transition:all .2s}
    .btn-sair:hover{background:rgba(255,255,255,.2)}

    /* ── MAIN ── */
    main{max-width:1100px;margin:0 auto;padding:24px 16px 60px}

    /* ── FILTROS ── */
    .filtros{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
    .filtro-btn{padding:8px 18px;border-radius:20px;border:2px solid var(--gray-200);background:white;font-family:'Barlow',sans-serif;font-size:13px;font-weight:600;color:var(--gray-600);cursor:pointer;transition:all .2s}
    .filtro-btn.active{background:var(--blue-mid);border-color:var(--blue-mid);color:white}
    .filtro-btn:hover:not(.active){border-color:var(--blue-light);color:var(--blue-light)}
    .search-input{padding:8px 16px;border:1.5px solid var(--gray-200);border-radius:20px;font-family:'Barlow',sans-serif;font-size:13px;color:var(--gray-800);background:white;width:220px;transition:border-color .2s}
    .search-input:focus{outline:none;border-color:var(--blue-light)}

    /* ── CARDS RESUMO ── */
    .resumo{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:24px}
    .resumo-card{background:white;border-radius:12px;padding:20px;box-shadow:0 2px 12px rgba(10,35,66,.06);border-top:4px solid var(--blue-light);text-align:center}
    .resumo-card.aberto{border-top-color:var(--orange)}
    .resumo-card.finalizado{border-top-color:var(--green)}
    .resumo-card.equip{border-top-color:var(--teal)}
    .resumo-num{font-family:'Barlow Condensed',sans-serif;font-size:40px;font-weight:700;color:var(--blue-dark);line-height:1}
    .resumo-card.aberto .resumo-num{color:var(--orange)}
    .resumo-card.finalizado .resumo-num{color:#16a34a}
    .resumo-label{font-size:12px;color:var(--gray-600);font-weight:600;text-transform:uppercase;letter-spacing:.8px;margin-top:6px}

    /* ── TOP EQUIPAMENTOS ── */
    .top-section{background:white;border-radius:12px;padding:20px;box-shadow:0 2px 12px rgba(10,35,66,.06);margin-bottom:24px}
    .section-title{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;color:var(--blue-mid);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:14px;display:flex;align-items:center;gap:8px}
    .top-item{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;border-radius:8px;background:var(--gray-50);margin-bottom:6px}
    .top-name{font-size:14px;font-weight:500;color:var(--gray-800)}
    .top-count{font-size:12px;font-weight:700;color:var(--blue-light);background:var(--gray-100);padding:3px 10px;border-radius:12px}

    /* ── LISTA OS ── */
    .lista-section{background:white;border-radius:12px;padding:20px;box-shadow:0 2px 12px rgba(10,35,66,.06)}
    .os-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;margin-top:14px}
    .os-card{border:1.5px solid var(--gray-200);border-radius:10px;padding:16px;transition:all .2s;background:var(--gray-50)}
    .os-card:hover{border-color:var(--blue-light);box-shadow:0 4px 16px rgba(45,114,210,.12);background:white}
    .os-card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
    .os-numero{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;color:var(--blue-dark)}
    .os-badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:12px;text-transform:uppercase;letter-spacing:.5px}
    .badge-aberto{background:#ffedd5;color:#9a3412}
    .badge-finalizado{background:#dcfce7;color:#166534}
    .os-row{display:flex;gap:6px;margin-bottom:5px;font-size:13px}
    .os-lbl{color:var(--gray-400);font-weight:600;min-width:85px;font-size:12px;text-transform:uppercase;letter-spacing:.5px}
    .os-val{color:var(--gray-800)}
    .os-desc{font-size:12px;color:var(--gray-600);background:var(--gray-100);border-radius:6px;padding:6px 8px;margin:8px 0;line-height:1.4;border-left:3px solid var(--gray-200)}
    .os-link{display:block;text-align:center;margin-top:12px;padding:8px;border-radius:8px;background:linear-gradient(135deg,var(--blue-mid),var(--blue-light));color:white;text-decoration:none;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:1px;text-transform:uppercase;transition:all .2s}
    .os-link:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(26,74,138,.3)}
    .os-link.finalizado{background:linear-gradient(135deg,#475569,#64748b)}
    .empty{text-align:center;padding:40px 20px;color:var(--gray-400);font-size:14px}
    .hidden{display:none}
    #loading{text-align:center;padding:60px 20px;color:var(--gray-600);font-size:15px}

    /* ── RELATÓRIO ── */
    .rel-wrapper{position:relative;display:inline-block}
    .btn-rel{padding:8px 18px;border-radius:20px;border:2px solid #16a34a;background:white;font-family:'Barlow',sans-serif;font-size:13px;font-weight:600;color:#16a34a;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:6px}
    .btn-rel:hover{background:#16a34a;color:white}
    .rel-dropdown{position:absolute;top:calc(100% + 6px);left:0;background:white;border-radius:10px;box-shadow:0 8px 24px rgba(10,35,66,.15);border:1px solid var(--gray-200);min-width:200px;z-index:100;display:none}
    .rel-dropdown.open{display:block}
    .rel-option{padding:12px 16px;font-size:13px;font-weight:600;color:var(--gray-800);cursor:pointer;display:flex;align-items:center;gap:8px;transition:background .15s}
    .rel-option:hover{background:var(--gray-50)}
    .rel-option:first-child{border-radius:10px 10px 0 0}
    .rel-option:last-child{border-radius:0 0 10px 10px;border-top:1px solid var(--gray-200)}
    @media(max-width:600px){
      .resumo{grid-template-columns:1fr 1fr}
      .h-title p{display:none}
      .search-input{width:100%}
      .filtros{gap:8px}
    }
  </style>
</head>
<body>

<!-- ── DASHBOARD ── -->
<div id="dashboard-screen">
  <header>
    <div class="h-left">
      <img src="../src/assets/logo-fsnh.png" class="h-logo" alt="FSPNH"/>
      <div class="h-title">
        <h1>Dashboard</h1>
        <p>Manutenção Clínica — FSNH</p>
      </div>
    </div>
    <div class="h-right">
      <div class="att-info">Atualizado às<br/><span id="ultima-att">—</span></div>
      <span id="user-email" style="font-size:11px;color:#94a3b8;margin-right:8px"></span>
      <button class="btn-sair" onclick="window.fazerLogout()">Sair</button>
    </div>
  </header>

  <main>
    <div id="loading">⏳ Carregando dados...</div>

    <div id="content" class="hidden">
      <!-- RESUMO -->
      <div class="resumo">
        <div class="resumo-card">
          <div class="resumo-num" id="cnt-total">0</div>
          <div class="resumo-label">📋 Total de OS</div>
        </div>
        <div class="resumo-card aberto">
          <div class="resumo-num" id="cnt-abertos">0</div>
          <div class="resumo-label">⏳ Em Aberto</div>
        </div>
        <div class="resumo-card finalizado">
          <div class="resumo-num" id="cnt-fechados">0</div>
          <div class="resumo-label">✅ Finalizadas</div>
        </div>
        <div class="resumo-card equip">
          <div class="resumo-num" id="cnt-equip">0</div>
          <div class="resumo-label">🔧 Equipamentos</div>
        </div>
      </div>

      <!-- TOP EQUIPAMENTOS -->
      <div class="top-section">
        <div class="section-title">🏆 Equipamentos Mais Chamados</div>
        <div id="top-equip"></div>
      </div>

      <!-- FILTROS + BUSCA -->
      <div class="filtros">
        <button class="filtro-btn active" onclick="filtrar('todos',this)">Todos</button>
        <button class="filtro-btn" onclick="filtrar('aberto',this)">⏳ Em Aberto</button>
        <button class="filtro-btn" onclick="filtrar('finalizado',this)">✅ Finalizados</button>
        <div class="rel-wrapper" id="rel-wrapper">
          <button class="btn-rel" onclick="toggleRelDropdown()">
            📊 Relatório ▾
          </button>
          <div class="rel-dropdown" id="rel-dropdown">
            <div class="rel-option" onclick="exportarCSV('aberto')">⏳ OS Em Aberto</div>
            <div class="rel-option" onclick="exportarCSV('finalizado')">✅ OS Finalizadas</div>
          </div>
        </div>
        <input class="search-input" id="busca" placeholder="🔍 Buscar por setor, OS, equipamento..." oninput="filtrar(filtroAtivo,null)"/>
      </div>

      <!-- LISTA -->
      <div class="lista-section">
        <div class="section-title">📋 Ordens de Serviço</div>
        <div class="os-grid" id="lista-os"></div>
      </div>
    </div>
  </main>
</div>

<script>
  let todosOS = [];
  let filtroAtivo = 'todos';

  // ── RENDER DASHBOARD ──────────────────────────────────────────
  window.renderDashboard = function(dados){
    todosOS = dados;

    const abertos     = dados.filter(o=>o.status==='aberto');
    const finalizados = dados.filter(o=>o.status==='finalizado');

    // Contadores
    document.getElementById('cnt-total').textContent    = dados.length;
    document.getElementById('cnt-abertos').textContent  = abertos.length;
    document.getElementById('cnt-fechados').textContent = finalizados.length;

    // Equipamentos únicos
    const equips = [...new Set(dados.map(o=>o.equipamento).filter(Boolean))];
    document.getElementById('cnt-equip').textContent = equips.length;

    // Top equipamentos
    const equipCount={};
    dados.forEach(o=>{ if(o.equipamento) equipCount[o.equipamento]=(equipCount[o.equipamento]||0)+1; });
    const top=Object.entries(equipCount).sort((a,b)=>b[1]-a[1]).slice(0,5);
    document.getElementById('top-equip').innerHTML = top.length
      ? top.map(([e,n],i)=>`
          <div class="top-item">
            <span class="top-name">${i+1}. ${e}</span>
            <span class="top-count">${n} chamado${n>1?'s':''}</span>
          </div>`).join('')
      : '<p style="color:#94a3b8;font-size:13px">Nenhum dado ainda.</p>';

    // Hora da última atualização
    document.getElementById('ultima-att').textContent =
      new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});

    document.getElementById('loading').classList.add('hidden');
    document.getElementById('content').classList.remove('hidden');

    renderLista(dados);
  };

  // ── FILTRAR ───────────────────────────────────────────────────
  function filtrar(status, btn){
    if(btn){
      filtroAtivo = status;
      document.querySelectorAll('.filtro-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
    }
    const busca = document.getElementById('busca').value.toLowerCase().trim();
    let lista = filtroAtivo==='todos' ? todosOS : todosOS.filter(o=>o.status===filtroAtivo);
    if(busca){
      lista = lista.filter(o=>
        (o.numero||'').toLowerCase().includes(busca) ||
        (o.setor||'').toLowerCase().includes(busca) ||
        (o.equipamento||'').toLowerCase().includes(busca) ||
        (o.solicitante||'').toLowerCase().includes(busca) ||
        (o.descricao||'').toLowerCase().includes(busca)
      );
    }
    renderLista(lista);
  }

  // ── DROPDOWN RELATÓRIO ───────────────────────────────────────
  function toggleRelDropdown(){
    const dd = document.getElementById('rel-dropdown');
    dd.classList.toggle('open');
  }
  // Fecha dropdown ao clicar fora
  document.addEventListener('click', e => {
    if(!document.getElementById('rel-wrapper').contains(e.target)){
      document.getElementById('rel-dropdown').classList.remove('open');
    }
  });

  // ── EXPORTAR CSV ──────────────────────────────────────────────
  function exportarCSV(status){
    document.getElementById('rel-dropdown').classList.remove('open');
    const lista = todosOS.filter(o=>o.status===status);
    if(!lista.length){
      alert('Nenhuma OS ' + (status==='aberto'?'em aberto':'finalizada') + ' encontrada.');
      return;
    }
    const cabecalho = ['Número','Data Abertura','Solicitante','Setor','Leito/Quarto','Equipamento','Marca/Modelo','Falha','Descrição','Técnico','Resp. Setor','Serviço Executado','Data Finalização','Status'];
    const linhas = lista.map(o=>[
      o.numero||'',
      o.dataHora||'',
      o.solicitante||'',
      o.setor||'',
      o.leito||'',
      o.equipamento||'',
      o.marca||'',
      o.falha||'',
      (o.descricao||'').replace(/,/g,';'),
      o.tecnico_nome||'',
      o.resp_nome||'',
      (o.obs_tecnico||'').replace(/,/g,';'),
      o.dataFim||'',
      o.status||''
    ].map(v=>`"${v}"`).join(','));

    const csv = '﻿' + [cabecalho.join(','), ...linhas].join('\n');
    const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    const data = new Date().toLocaleDateString('pt-BR').replace(/\//g,'-');
    a.href     = url;
    a.download = `OS_${status==='aberto'?'Abertas':'Finalizadas'}_${data}.csv`;
    a.click();
    URL.revokeObjectURL(url);
  }

  // ── RENDERIZAR LISTA ─────────────────────────────────────────
  function renderLista(lista){
    const el = document.getElementById('lista-os');
    if(!lista.length){
      el.innerHTML='<div class="empty" style="grid-column:1/-1">Nenhuma OS encontrada.</div>';
      return;
    }
    el.innerHTML = lista.map(o=>`
      <div class="os-card">
        <div class="os-card-header">
          <span class="os-numero">${o.numero||'—'}</span>
          <span class="os-badge ${o.status==='aberto'?'badge-aberto':'badge-finalizado'}">
            ${o.status==='aberto'?'⏳ Aberto':'✅ Finalizado'}
          </span>
        </div>
        <div class="os-row"><span class="os-lbl">Setor</span><span class="os-val">${o.setor||'—'}</span></div>
        <div class="os-row"><span class="os-lbl">Equipamento</span><span class="os-val">${o.equipamento||'—'}</span></div>
        <div class="os-row"><span class="os-lbl">Falha</span><span class="os-val">${o.falha||'—'}</span></div>
        <div class="os-row"><span class="os-lbl">Solicitante</span><span class="os-val">${o.solicitante||'—'}</span></div>
        <div class="os-row"><span class="os-lbl">Abertura</span><span class="os-val">${o.dataHora||'—'}</span></div>
        ${o.status==='finalizado'?`<div class="os-row"><span class="os-lbl">Finalizado</span><span class="os-val">${o.dataFim||'—'}</span></div>`:''}
        <div class="os-desc">${(o.descricao||'—').substring(0,100)}${(o.descricao||'').length>100?'...':''}</div>
        <a href="/os/?os=${o.numero}" class="os-link ${o.status==='finalizado'?'finalizado':''}">
          ${o.status==='aberto'?'🔧 Abrir para Finalizar':'👁️ Visualizar OS'}
        </a>
      </div>`).join('');
  }
</script>
</body>
</html>
